<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swap</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="swap">
        <div class="header">
            <h1>swap</h1>
        </div>

        <div class="btc">
            <input type="number" placeholder="0.00">
            <span id="TokenA">BTC</span>
        </div>

        <div class="switch">
            <button id="switch-btn">⇅</button>
        </div>

        <div class="usdt">
            <input type="number" placeholder="0.00">
            <span id="TokenB">USDT</span>
        </div>

        <div class="exchange-rate">
            <p>汇率</p>
            <p id="price">1 BTC = 71000 USDT</p>
        </div>

        <div class="swap-btn">
            <button>swap</button>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
