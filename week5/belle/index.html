<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Swap</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Mini Swap</h1>
    
    <div class="swap-box">
      <!-- Token A 输入区 -->
      <div class="token-input">
        <label>Token A (ETH)</label>
        <input type="number" id="tokenA" placeholder="输入数量" min="0">
      </div>

      <!-- Swap 方向按钮 -->
      <button id="swapBtn" class="swap-btn">⇅</button>

      <!-- Token B 输入区 -->
      <div class="token-input">
        <label>Token B (USDC)</label>
        <input type="number" id="tokenB" placeholder="自动计算" readonly>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
